<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Escala de Coroinhas – São Benedito RO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        /* ===== RESET + VARIÁVEIS ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-gradient: linear-gradient(145deg, #5b6abf 0%, #6d4c9a 100%);
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --accent: #2ec4b6;
            --accent-dark: #25a89a;
            --danger: #ef476f;
            --warning: #ffd166;
            --muted: #6b7a8f;
            --card-bg: #ffffff;
            --radius: 18px;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            --touch: 52px;
        }

        html {
            font-size: clamp(15px, 3.4vw, 18px);
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            color: #1e293b;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--primary), #2c3e50);
            color: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 1.7rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .logo h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            gap: 8px;
            align-items: center;
            white-space: nowrap;
        }

        /* ===== BOTÕES ===== */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #1e293b;
            min-height: var(--touch);
            min-width: 44px;
            justify-content: center;
            touch-action: manipulation;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:active {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--accent);
            color: white;
        }
        .btn-success:active {
            background: var(--accent-dark);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:active {
            background: #d63d5e;
        }

        .btn-warning {
            background: var(--warning);
            color: #1e293b;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
        }
        .btn-outline:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 0.85rem;
            min-height: 44px;
            min-width: 40px;
        }

        /* ===== MAIN ===== */
        .main-content {
            padding: 18px;
            flex: 1;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .month-selector h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f172a;
            min-width: 150px;
            text-align: center;
            margin: 0;
            letter-spacing: -0.2px;
        }

        /* ===== CALENDÁRIO ===== */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        /* cabeçalho dos dias da semana */
        .calendar-grid .day-header {
            background: transparent;
            border: none;
            padding: 6px 0;
            text-align: center;
            color: var(--muted);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .calendar-day {
            background: #f8fafc;
            border: 2px solid #e9edf2;
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
        }

        .calendar-day:active {
            transform: scale(0.96);
            border-color: var(--primary);
        }

        .calendar-day.today {
            border-color: var(--warning);
            background: rgba(255, 209, 102, 0.10);
        }

        .calendar-day .day-number {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }

        .calendar-day .day-weekday {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .calendar-day .has-missa {
            display: inline-block;
            margin-top: 2px;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .calendar-day .no-missa {
            color: #b0bcc8;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 16px;
            animation: fadeIn 0.25s;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 20px 18px;
            width: 100%;
            max-width: 600px;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header h3 i {
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--muted);
            padding: 0 8px;
            line-height: 1;
            transition: transform 0.15s;
            touch-action: manipulation;
        }

        .modal-close:active {
            transform: scale(0.85);
        }

        /* Itens de missa no modal */
        .missa-item {
            background: #f8fafc;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 14px;
            border-left: 5px solid var(--primary);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: background 0.15s;
        }

        .missa-item .missa-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 6px;
        }

        .missa-item .horario {
            font-weight: 700;
            font-size: 1.05rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .missa-item .horario i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .missa-item .local {
            color: var(--muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .missa-item .status-tag {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .status-confirmado {
            background: #d1fae5;
            color: #065f46;
        }

        .status-pendente {
            background: #fef3c7;
            color: #92400e;
        }

        .status-vago {
            background: #e9edf2;
            color: #475569;
        }

        .missa-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .missa-actions .btn {
            flex: 1 1 auto;
            min-width: 80px;
            justify-content: center;
        }

        /* ===== LOGIN ===== */
        .login-screen {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            padding: 20px;
            width: 100%;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.20);
            text-align: center;
        }

        .login-card i.fa-church {
            font-size: 3.2rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .login-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .login-card p {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 18px;
        }

        .login-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            touch-action: manipulation;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .login-btn.admin {
            background: #1e293b;
            color: white;
        }

        .login-btn.coroinha {
            background: var(--primary);
            color: white;
        }

        .login-coroinha-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 12px;
            background: #f8fafc;
            transition: border 0.2s;
        }

        .login-coroinha-input:focus {
            border-color: var(--primary);
            outline: none;
            background: white;
        }

        .debug-info {
            background: #f1f5f9;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #334155;
            margin-top: 14px;
            display: inline-block;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            gap: 8px;
        }

        .toast {
            background: white;
            border-radius: 14px;
            padding: 14px 20px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            width: 100%;
            max-width: 420px;
            pointer-events: auto;
            border-left: 6px solid var(--primary);
        }

        .toast.success {
            border-left-color: var(--accent);
        }
        .toast.error {
            border-left-color: var(--danger);
        }
        .toast.info {
            border-left-color: var(--primary);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(30px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 30px 10px;
            color: var(--muted);
        }

        .empty-state i {
            font-size: 2.4rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* ===== FAB (mobile) ===== */
        .fab {
            position: fixed;
            right: 20px;
            bottom: 24px;
            z-index: 1200;
            border-radius: 60px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            display: none;
            min-width: 60px;
            min-height: 60px;
            padding: 0 20px;
            font-size: 1.1rem;
            background: var(--accent);
            color: white;
            border: none;
            transition: transform 0.15s, box-shadow 0.2s;
            touch-action: manipulation;
        }

        .fab:active {
            transform: scale(0.92);
        }

        /* ===== RESPONSIVO ===== */

        /* Tablets e telas médias */
        @media (max-width: 900px) {
            .container {
                margin: 8px;
                border-radius: 16px;
            }
            .month-selector h2 {
                min-width: 130px;
                font-size: 1rem;
            }
            .calendar-day {
                min-height: 70px;
                padding: 8px 4px;
            }
        }

        /* Celular */
        @media (max-width: 640px) {
            body {
                padding: 6px;
            }

            .header {
                padding: 12px 14px;
            }
            .logo i {
                font-size: 1.4rem;
            }
            .logo h1 {
                font-size: 1rem;
            }
            .user-badge {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
            .btn {
                padding: 8px 14px;
                font-size: 0.9rem;
                min-height: 48px;
                border-radius: 10px;
            }
            .btn-sm {
                padding: 6px 12px;
                font-size: 0.8rem;
                min-height: 40px;
            }

            .main-content {
                padding: 12px;
            }

            .controls {
                margin-bottom: 12px;
                gap: 8px;
            }

            /* Calendário em lista vertical */
            .calendar-grid {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            .calendar-grid .day-header {
                display: none;
            }

            .calendar-day {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 12px 16px;
                min-height: 56px;
                border-radius: 12px;
                gap: 8px;
                background: #ffffff;
                border: 1px solid #e9edf2;
            }

            .calendar-day .day-number {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--primary);
            }

            .calendar-day .day-weekday {
                font-size: 0.7rem;
                font-weight: 600;
                color: var(--muted);
                text-transform: uppercase;
                margin-right: auto;
            }

            .calendar-day .has-missa {
                font-size: 0.75rem;
                padding: 4px 14px;
            }

            .calendar-day .no-missa {
                font-size: 0.75rem;
            }

            /* Modal em mobile */
            .modal-content {
                padding: 16px 14px;
                border-radius: 16px;
                max-width: 100%;
            }

            .modal-header h3 {
                font-size: 1.05rem;
            }

            .missa-item {
                padding: 12px 14px;
                gap: 8px;
            }

            .missa-item .missa-header {
                flex-direction: column;
                align-items: stretch;
                gap: 4px;
            }

            .missa-item .horario {
                font-size: 0.95rem;
            }

            .missa-item .local {
                font-size: 0.85rem;
            }

            .missa-actions .btn {
                flex: 1 0 auto;
                min-width: 60px;
                font-size: 0.8rem;
                padding: 6px 10px;
            }

            /* FAB aparece */
            .fab {
                display: block;
                right: 16px;
                bottom: 20px;
                min-width: 56px;
                min-height: 56px;
                padding: 0 18px;
                font-size: 1rem;
            }

            .login-card {
                padding: 24px 18px;
            }
            .login-card h2 {
                font-size: 1.1rem;
            }
        }

        /* Telas muito pequenas */
        @media (max-width: 400px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .header-actions {
                justify-content: space-between;
            }
            .logo h1 {
                font-size: 0.95rem;
            }
            .calendar-day {
                padding: 10px 12px;
                min-height: 48px;
            }
            .month-selector h2 {
                min-width: 110px;
                font-size: 0.9rem;
            }
            .btn {
                font-size: 0.8rem;
                padding: 6px 10px;
                min-height: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== LOGIN ===== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <i class="fas fa-church"></i>
            <h2>Paróquia São Benedito</h2>
            <p>Escala de Coroinhas</p>
            <button class="login-btn admin" id="btnAdminLogin">
                <i class="fas fa-lock"></i> Administrador
            </button>
            <button class="login-btn coroinha" id="btnCoroinhaLogin">
                <i class="fas fa-user"></i> Sou Coroinha
            </button>
            <div id="loginCoroinhaForm" style="display:none; margin-top:14px;">
                <input type="text" id="nomeCoroinhaLogin" class="login-coroinha-input" placeholder="Digite seu nome completo" autocomplete="off" />
                <button class="login-btn coroinha" id="btnLoginCoroinha">Entrar</button>
            </div>
            <div id="loginAdminForm" style="display:none; margin-top:14px;">
                <input type="password" id="senhaAdmin" class="login-coroinha-input" placeholder="Senha" />
                <button class="login-btn admin" id="btnLoginAdmin">Entrar</button>
            </div>
            <div id="statusMessage" class="debug-info">Carregando...</div>
        </div>
    </div>

    <!-- ===== SISTEMA ===== -->
    <div class="container" id="mainSystem" style="display:none;">
        <header class="header">
            <div class="logo">
                <i class="fas fa-church"></i>
                <h1>Escala</h1>
            </div>
            <div class="header-actions">
                <span class="user-badge" id="userBadge"></span>
                <button class="btn btn-outline btn-sm" id="btnLogout">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="controls">
                <div class="month-selector">
                    <button class="btn btn-sm" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <h2 id="currentMonth">Carregando...</h2>
                    <button class="btn btn-sm" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div id="adminActions" style="display:none;">
                    <button class="btn btn-success btn-sm" id="generateScaleBtn">
                        <i class="fas fa-magic"></i> Gerar
                    </button>
                </div>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>
        </main>
    </div>

    <!-- ===== MODAL DO DIA ===== -->
    <div class="modal" id="dayModal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalDayTitle">
            <div class="modal-header">
                <h3 id="modalDayTitle"><i class="fas fa-calendar-alt"></i> Dia</h3>
                <button class="modal-close" id="modalCloseBtn" aria-label="Fechar">&times;</button>
            </div>
            <div id="modalDayContent"></div>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <!-- ===== FAB (mobile) ===== -->
    <button id="fabGenerate" class="fab" title="Gerar Escala (Admin)">
        <i class="fas fa-magic"></i> Gerar
    </button>

    <script>
        // ================================================================
        //  SUPABASE + LÓGICA ORIGINAL (mantida, apenas pequenos ajustes)

        const SUPABASE_URL = 'https://dflnzwutjzcqcsshvxdq.supabase.co';

        const DB = {
            async getCoroinhas() {
                if (useLocalStorage) return this._localGet('coroinhas');
                const { data, error } = await supabaseClient.from('coroinhas').select('*').order('nome');
                if (error) { this._fallback(); throw error; }
                return data || [];
            },
            async getCoroinhaByNome(nome) {
                if (useLocalStorage) {
                    const list = this._localGet('coroinhas');
                    return list.find(c => c.nome.toLowerCase() === nome.toLowerCase()) || null;
                }
                const { data, error } = await supabaseClient.from('coroinhas').select('*').ilike('nome', nome).maybeSingle();
                if (error) { this._fallback(); throw error; }
                return data;
            },
            async createCoroinha(nome) {
                if (useLocalStorage) {
                    const list = this._localGet('coroinhas');
                    const novo = { id: Date.now().toString(), nome, ativo: true };
                    list.push(novo);
                    this._localSet('coroinhas', list);
                    return novo;
                }
                const { data, error } = await supabaseClient.from('coroinhas').insert({ nome, ativo: true }).select().single();
                if (error) { this._fallback(); throw error; }
                return data;
            },
            async getHorarios() {
                if (useLocalStorage) return this._localGet('horarios');
                const { data, error } = await supabaseClient.from('horarios').select('*');
                if (error) { this._fallback(); throw error; }
                return data || [];
            },
            async getDisponibilidades(mes, ano) {
                if (useLocalStorage) {
                    const all = this._localGet('disponibilidades');
                    return all.filter(d => d.mes === mes && d.ano === ano);
                }
                const { data, error } = await supabaseClient.from('disponibilidades').select('*').eq('mes', mes).eq('ano', ano);
                if (error) { this._fallback(); throw error; }
                return data || [];
            },
            async getEscalas(mes, ano) {
                if (useLocalStorage) {
                    const all = this._localGet('escalas');
                    return all.filter(e => e.mes === mes && e.ano === ano);
                }
                const { data, error } = await supabaseClient.from('escalas').select('*').eq('mes', mes).eq('ano', ano);
                if (error) { this._fallback(); throw error; }
                return data || [];
            },
            async createEscala(escala) {
                if (useLocalStorage) {
                    const list = this._localGet('escalas');
                    const nova = { ...escala, id: Date.now().toString() + Math.random() };
                    list.push(nova);
                    this._localSet('escalas', list);
                    return nova;
                }
                const { data, error } = await supabaseClient.from('escalas').insert(escala).select().single();
                if (error) { this._fallback(); throw error; }
                return data;
            },
            async updateEscala(id, updates) {
                if (useLocalStorage) {
                    const list = this._localGet('escalas');
                    const idx = list.findIndex(e => e.id === id);
                    if (idx !== -1) { list[idx] = { ...list[idx], ...updates };
                        this._localSet('escalas', list); }
                    return list[idx];
                }
                const { data, error } = await supabaseClient.from('escalas').update(updates).eq('id', id).select().single();
                if (error) { this._fallback(); throw error; }
                return data;
            },
            async deleteEscala(id) {
                if (useLocalStorage) {
                    let list = this._localGet('escalas');
                    list = list.filter(e => e.id !== id);
                    this._localSet('escalas', list);
                    return;
                }
                const { error } = await supabaseClient.from('escalas').delete().eq('id', id);
                if (error) { this._fallback(); throw error; }
            },
            async deleteEscalasByData(dataEscala) {
                if (useLocalStorage) {
                    let list = this._localGet('escalas');
                    list = list.filter(e => e.data_escala !== dataEscala);
                    this._localSet('escalas', list);
                    return;
                }
                const { error } = await supabaseClient.from('escalas').delete().eq('data_escala', dataEscala);
                if (error) { this._fallback(); throw error; }
            },
            _fallback() {
                if (!useLocalStorage) {
                    useLocalStorage = true;
                    console.warn('⚠️ Usando localStorage como fallback');
                    document.getElementById('statusMessage').textContent = '⚠️ Modo offline (localStorage)';
                    showToast('Modo offline ativado', 'info');
                }
            },
            _localGet(key) {
                try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
            },
            _localSet(key, data) {
                localStorage.setItem(key, JSON.stringify(data));
            }
        };

        async function renderizarCalendario() {
            try {
                const grid = document.getElementById('calendarGrid');
                const mes = currentDate.getMonth() + 1;
                const ano = currentDate.getFullYear();
                const hoje = new Date();
                const primeiroDia = new Date(ano, mes - 1, 1).getDay();
                const diasNoMes = new Date(ano, mes, 0).getDate();

                const escalas = await DB.getEscalas(mes, ano);
                const confirmados = escalas.filter(e => e.status === 'confirmado');
                const porDia = {};
                confirmados.forEach(e => {
                    const key = e.data_escala;
                    porDia[key] = (porDia[key] || 0) + 1;
                });

                let html = '';
                const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
                for (let i = 0; i < 7; i++) {
                    html += `<div class="day-header">${diasSemana[i]}</div>`;
                }

                for (let i = 0; i < primeiroDia; i++) {
                    html += `<div></div>`;
                }

                for (let dia = 1; dia <= diasNoMes; dia++) {
                    const data = new Date(ano, mes - 1, dia);
                    const dataStr = `${ano}-${String(mes).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                    const isToday = data.toDateString() === hoje.toDateString();
                    const count = porDia[dataStr] || 0;
                    const diaSemanaAbrev = diasSemana[data.getDay()];

                    html += `
                        <div class="calendar-day ${isToday ? 'today' : ''}" data-data="${dataStr}" role="button" tabindex="0" aria-label="Dia ${dia}">
                            <span class="day-number">${dia}</span>
                            <span class="day-weekday">${diaSemanaAbrev}</span>
                            ${count > 0 ? `<span class="has-missa">${count} ${count === 1 ? 'missa' : 'missas'}</span>` : `<span class="no-missa">—</span>`}
                        </div>
                    `;
                }

                grid.innerHTML = html;

                document.querySelectorAll('.calendar-day[data-data]').forEach(el => {
                    el.addEventListener('click', function() {
                        abrirDia(this.dataset.data);
                    });
                    el.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') abrirDia(this.dataset.data);
                    });
                });

                updateMonthDisplay();
            } catch (e) {
                console.error('Erro ao renderizar calendário:', e);
                showToast('Erro ao carregar calendário: ' + e.message, 'error');
            }
        }

        async function abrirDia(dataStr) {
            try {
                const modal = document.getElementById('dayModal');
                const title = document.getElementById('modalDayTitle');
                const content = document.getElementById('modalDayContent');

                const [ano, mes, dia] = dataStr.split('-').map(Number);
                const data = new Date(ano, mes - 1, dia);
                const diaSemana = ['domingo', 'segunda', 'terca', 'quarta', 'quinta', 'sexta', 'sabado'][data.getDay()];
                const nomeDia = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'][data.getDay()];
                title.innerHTML = `<i class="fas fa-calendar-alt"></i> ${nomeDia}, ${dia}/${mes}/${ano}`;

                let horarios = await DB.getHorarios();
                let horariosDoDia = horarios.filter(h => h.dia_semana === diaSemana);
                if (diaSemana === 'sexta' && dia <= 7) {
                    horariosDoDia.push({
                        id: 'extra-' + dia,
                        dia_semana: 'sexta',
                        horario: '08:00',
                        local: 'Paróquia São Benedito (1ª Sexta)'
                    });
                }

                const todasEscalas = await DB.getEscalas(mes, ano);
                const escalasDoDia = todasEscalas.filter(e => e.data_escala === dataStr);

                let html = '';
                if (horariosDoDia.length === 0) {
                    html = `
                        <div class="empty-state">
                            <i class="fas fa-clock"></i>
                            <p>Nenhum horário de missa neste dia.</p>
                        </div>
                    `;
                } else {
                    for (const h of horariosDoDia) {
                        const escalasHorario = escalasDoDia.filter(e => e.horario === h.horario && e.local === h.local);
                        const confirmados = escalasHorario.filter(e => e.status === 'confirmado');
                        const pendentes = escalasHorario.filter(e => e.status === 'pendente');

                        const isAdmin = (currentUser === 'admin');
                        const isCoroinha = (currentUser !== 'admin' && currentUser !== null);
                        const coroinhaId = currentUser?.id;

                        let statusHtml = '';
                        let acoesHtml = '';

                        const minhaConfirmacao = confirmados.find(e => e.coroinha_id === coroinhaId);
                        const minhaPendencia = pendentes.find(e => e.coroinha_id === coroinhaId);

                        if (isAdmin) {
                            if (confirmados.length > 0) {
                                const nomes = confirmados.map(e => e.coroinha_nome).join(', ');
                                statusHtml += `<span class="status-tag status-confirmado"><i class="fas fa-check-circle"></i> Confirmados: ${nomes}</span>`;
                            }
                            if (pendentes.length > 0) {
                                const nomes = pendentes.map(e => e.coroinha_nome).join(', ');
                                statusHtml += `<span class="status-tag status-pendente"><i class="fas fa-hourglass-half"></i> Pendentes: ${nomes}</span>`;
                                pendentes.forEach(p => {
                                    acoesHtml += `
                                        <button class="btn btn-success btn-sm" data-action="confirmar" data-id="${p.id}"><i class="fas fa-check"></i> Confirmar</button>
                                        <button class="btn btn-danger btn-sm" data-action="recusar" data-id="${p.id}"><i class="fas fa-times"></i> Recusar</button>
                                    `;
                                });
                            }
                            if (confirmados.length === 0 && pendentes.length === 0) {
                                statusHtml = `<span class="status-tag status-vago">Vago</span>`;
                            }
                        } else if (isCoroinha) {
                            if (minhaConfirmacao) {
                                statusHtml = `<span class="status-tag status-confirmado"><i class="fas fa-check-circle"></i> Confirmado</span>`;
                                acoesHtml =
                                    `<button class="btn btn-danger btn-sm" data-action="cancelar-confirmacao" data-id="${minhaConfirmacao.id}">Cancelar</button>`;
                            } else if (minhaPendencia) {
                                statusHtml = `<span class="status-tag status-pendente"><i class="fas fa-hourglass-half"></i> Aguardando</span>`;
                                acoesHtml =
                                    `<button class="btn btn-danger btn-sm" data-action="cancelar-oferta" data-id="${minhaPendencia.id}">Cancelar oferta</button>`;
                            } else {
                                statusHtml = `<span class="status-tag status-vago">Vago</span>`;
                                acoesHtml =
                                    `<button class="btn btn-primary btn-sm" data-action="oferecer" data-data="${dataStr}" data-horario="${h.horario}" data-local="${h.local}"><i class="fas fa-hand-holding-heart"></i> Oferecer</button>`;
                            }
                        }

                        html += `
                            <div class="missa-item">
                                <div class="missa-header">
                                    <div>
                                        <div class="horario"><i class="fas fa-clock"></i> ${h.horario}</div>
                                        <div class="local"><i class="fas fa-church"></i> ${h.local}</div>
                                    </div>
                                    <div>${statusHtml}</div>
                                </div>
                                <div class="missa-actions">${acoesHtml}</div>
                            </div>
                        `;
                    }
                }

                if (currentUser === 'admin') {
                    html += `
                        <div style="margin-top:16px; text-align:right;">
                            <button class="btn btn-danger btn-sm" data-action="limpar-dia" data-data="${dataStr}"><i class="fas fa-trash"></i> Limpar dia</button>
                        </div>
                    `;
                }

                content.innerHTML = html;

                content.querySelectorAll('[data-action]').forEach(btn => {
                    btn.addEventListener('click', async function(e) {
                        const action = this.dataset.action;
                        if (action === 'confirmar') {
                            await confirmarEscala(this.dataset.id);
                        } else if (action === 'recusar') {
                            await recusarEscala(this.dataset.id);
                        } else if (action === 'cancelar-confirmacao') {
                            await cancelarConfirmacao(this.dataset.id);
                        } else if (action === 'cancelar-oferta') {
                            await cancelarOferta(this.dataset.id);
                        } else if (action === 'oferecer') {
                            await oferecerCoroinha(this.dataset.data, this.dataset.horario, this.dataset.local);
                        } else if (action === 'limpar-dia') {
                            await limparDia(this.dataset.data);
                        }
                    });
                });

                modal.classList.add('active');
                modal.setAttribute('aria-hidden', 'false');
            } catch (e) {
                console.error('Erro ao abrir dia:', e);
                showToast('Erro ao carregar dia: ' + e.message, 'error');
            }
        }

        async function oferecerCoroinha(dataStr, horario, local) {
            try {
                if (!coroinhaAtual) { showToast('Erro: coroinha não identificado', 'error'); return; }
                const [ano, mes] = dataStr.split('-').map(Number);

                const escalas = await DB.getEscalas(mes, ano);
                const existente = escalas.find(e =>
                    e.data_escala === dataStr &&
                    e.horario === horario &&
                    e.local === local &&
                    e.coroinha_id === coroinhaAtual.id
                );
                if (existente) {
                    showToast('Você já está nessa missa!', 'error');
                    return;
                }

                const novaEscala = {
                    mes, ano,
                    data_escala: dataStr,
                    horario, local,
                    coroinha_id: coroinhaAtual.id,
                    coroinha_nome: coroinhaAtual.nome,
                    status: 'pendente',
                    funcao: 'Coroinha'
                };

                await DB.createEscala(novaEscala);
                showToast('Oferta registrada! Aguardando confirmação.', 'success');
                await abrirDia(dataStr);
                await renderizarCalendario();
            } catch (e) {
                console.error('Erro ao oferecer coroinha:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function generateScale() {
            try {
                if (currentUser !== 'admin') {
                    showToast('Apenas administradores podem gerar escala!', 'error');
                    return;
                }
                const mes = currentDate.getMonth() + 1;
                const ano = currentDate.getFullYear();

                let horarios = await DB.getHorarios();
                if (horarios.length === 0) { showToast('Cadastre horários primeiro!', 'error'); return; }

                const disponibilidades = await DB.getDisponibilidades(mes, ano);
                if (disponibilidades.length === 0) { showToast('Nenhum coroinha respondeu disponibilidade!', 'error'); return; }

                const coroinhas = await DB.getCoroinhas();
                const ativos = coroinhas.filter(c => c.ativo);
                if (ativos.length === 0) { showToast('Nenhum coroinha ativo!', 'error'); return; }

                let horariosExpandidos = horarios.map(h => ({ ...h }));
                const diasNoMes = new Date(ano, mes, 0).getDate();
                for (let dia = 1; dia <= diasNoMes; dia++) {
                    const data = new Date(ano, mes - 1, dia);
                    if (data.getDay() === 5 && dia <= 7) {
                        horariosExpandidos.push({
                            id: 'extra-' + dia,
                            dia_semana: 'sexta',
                            horario: '08:00',
                            local: 'Paróquia São Benedito (1ª Sexta)'
                        });
                    }
                }

                const novasEscalas = [];
                const usados = {};

                for (let dia = 1; dia <= diasNoMes; dia++) {
                    const data = new Date(ano, mes - 1, dia);
                    const diaSemana = ['domingo', 'segunda', 'terca', 'quarta', 'quinta', 'sexta', 'sabado'][data.getDay()];
                    const dataStr = `${ano}-${String(mes).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                    const horariosDoDia = horariosExpandidos.filter(h => h.dia_semana === diaSemana);

                    for (const h of horariosDoDia) {
                        const disponiveis = disponibilidades.filter(d => {
                            const dispDia = d.disponibilidade?.[diaSemana] || [];
                            return dispDia.includes(h.horario);
                        });
                        if (disponiveis.length === 0) continue;
                        disponiveis.sort((a, b) => (usados[a.coroinha_id] || 0) - (usados[b.coroinha_id] || 0));
                        const escolhido = disponiveis[0];
                        const coroinha = ativos.find(c => c.id === escolhido.coroinha_id);
                        if (!coroinha) continue;

                        novasEscalas.push({
                            mes, ano,
                            data_escala: dataStr,
                            horario: h.horario,
                            local: h.local || '',
                            coroinha_id: coroinha.id,
                            coroinha_nome: coroinha.nome,
                            status: 'confirmado',
                            funcao: 'Coroinha'
                        });
                        usados[coroinha.id] = (usados[coroinha.id] || 0) + 1;
                    }
                }

                if (novasEscalas.length === 0) { showToast('Nenhuma escala possível!', 'error'); return; }

                const escalasExistentes = await DB.getEscalas(mes, ano);
                for (const e of escalasExistentes) {
                    await DB.deleteEscala(e.id);
                }
                for (const esc of novasEscalas) {
                    await DB.createEscala(esc);
                }

                await renderizarCalendario();
                showToast(`Escala gerada! ${novasEscalas.length} missas`, 'success');
            } catch (e) {
                console.error('Erro ao gerar escala:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(40px)';
                setTimeout(() => toast.remove(), 300);
            }, 3200);
        }

        function toggleFab() {
            const fab = document.getElementById('fabGenerate');
            const isMobile = window.innerWidth <= 640;
            if (currentUser === 'admin' && isMobile) {
                fab.style.display = 'flex';
            } else {
                fab.style.display = 'none';
            }
        }

        // ===== INICIALIZAÇÃO =====
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Inicializando sistema...');

            document.getElementById('btnAdminLogin').addEventListener('click', showAdminLogin);
            document.getElementById('btnCoroinhaLogin').addEventListener('click', showCoroinhaLogin);
            document.getElementById('btnLoginAdmin').addEventListener('click', loginAdmin);
            document.getElementById('btnLoginCoroinha').addEventListener('click', loginCoroinha);

            document.getElementById('btnLogout').addEventListener('click', logout);
            document.getElementById('prevMonth').addEventListener('click', prevMonth);
            document.getElementById('nextMonth').addEventListener('click', nextMonth);
            document.getElementById('generateScaleBtn').addEventListener('click', generateScale);

            document.getElementById('modalCloseBtn').addEventListener('click', closeDayModal);
            document.getElementById('dayModal').addEventListener('click', function(e) {
                if (e.target === this) closeDayModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeDayModal();
            });

            document.getElementById('fabGenerate').addEventListener('click', generateScale);

            updateMonthDisplay();
            document.getElementById('statusMessage').textContent = '✅ Pronto! Clique em um botão.';
            window.addEventListener('resize', toggleFab);
        });
    </script>
</body>
