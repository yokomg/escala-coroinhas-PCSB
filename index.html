<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Permitir zoom e usar initial-scale padrão -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Escala de Coroinhas da Paróquia São Benedito RO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Variáveis e reset */
        :root{
            --bg-gradient: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            --primary:#4a90e2;
            --accent:#28a745;
            --muted:#6c757d;
            --card-bg: #ffffff;
            --radius: 16px;
            --touch: 56px; /* alvo de toque maior para mobile */
        }

        /* Tipografia responsiva: aumenta fontes automaticamente em telas pequenas */
        html {
            font-size: clamp(15px, 3.2vw, 18px);
            -webkit-text-size-adjust: 100%; /* evita redução automática em iOS */
            touch-action: manipulation;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        html,body { height:100%; }
        body { font-family:'Inter',sans-serif; background:var(--bg-gradient); min-height:100vh; padding:12px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; line-height:1.35; }

        /* Container principal */
        .container { max-width:1100px; margin:0 auto; background:var(--card-bg); border-radius:var(--radius); box-shadow:0 18px 50px rgba(0,0,0,0.18); overflow:hidden; display:flex; flex-direction:column; }

        /* Header */
        .header { background: linear-gradient(135deg,var(--primary),#2c3e50); color:white; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
        .logo { display:flex; align-items:center; gap:10px; }
        .logo i { font-size:1.6rem; }
        .logo h1 { font-size:1.25rem; font-weight:600; margin:0; letter-spacing:0.2px; }
        .header-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

        /* Badges e botões */
        .user-badge { background:rgba(255,255,255,0.12); padding:8px 12px; border-radius:20px; font-size:0.95rem; display:inline-flex; gap:8px; align-items:center; }
        .btn { padding:calc(var(--touch) / 6) 1rem; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:transform .18s ease, box-shadow .18s ease; display:inline-flex; align-items:center; gap:8px; background:white; color:#2c3e50; min-height:var(--touch); }
        .btn:active { transform:translateY(1px); }
        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.12); }
        .btn-primary { background:var(--primary); color:white; }
        .btn-success { background:var(--accent); color:white; }
        .btn-warning { background:#ffc107; color:#2c3e50; }
        .btn-danger { background:#dc3545; color:white; }
        .btn-sm { padding:8px 10px; font-size:0.95rem; min-height:48px; }

        /* Main */
        .main-content { padding:18px; flex:1 1 auto; }
        .controls { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:12px; flex-wrap:wrap; }
        .month-selector { display:flex; align-items:center; gap:12px; }
        .month-selector h2 { font-size:1.15rem; color:#2c3e50; min-width:170px; text-align:center; margin:0; }

        /* Calendário - desktop */
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; margin-bottom:8px; align-items:start; }
        /* os primeiros 7 divs gerados pelo JS são os nomes dos dias da semana */
        .calendar-grid > div:nth-child(-n+7) { background:transparent; border:none; padding:8px 0; text-align:center; color:var(--muted); font-weight:700; font-size:0.9rem; }
        .calendar-day { background:var(--card-bg); border:2px solid #e6e6e6; border-radius:10px; padding:12px 10px; text-align:center; cursor:pointer; transition:all 0.22s; min-height:84px; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:8px; }
        .calendar-day:hover { border-color:var(--primary); transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,0.06); }
        .calendar-day.today { border-color:#ffc107; background:rgba(255,193,7,0.06); }
        .calendar-day .day-number { font-size:clamp(1.2rem, 4.5vw, 1.6rem); font-weight:700; color:var(--primary); }
        .calendar-day .has-missa { display:inline-block; margin-top:3px; background:var(--accent); color:white; padding:6px 10px; border-radius:999px; font-size:0.78rem; }
        .calendar-day .no-missa { color:#999; font-size:0.78rem; margin-top:3px; }

        /* Modal */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; padding:16px; }
        .modal.active { display:flex; }
        .modal-content { background:white; border-radius:16px; padding:18px; width:100%; max-width:720px; box-shadow:0 22px 80px rgba(0,0,0,0.3); max-height:92vh; overflow-y:auto; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:2px solid #f0f0f0; padding-bottom:8px; }
        .modal-header h3 { font-size:1.2rem; margin:0; }
        .modal-close { background:none; border:none; font-size:1.6rem; cursor:pointer; color:#6c757d; padding:0 6px; }

        .missa-item { background:#f8f9fa; border-radius:10px; padding:12px; margin-bottom:12px; border-left:4px solid var(--primary); display:flex; flex-direction:column; gap:8px; }
        .missa-item .horario { font-weight:700; font-size:1.05rem; color:#2c3e50; }
        .missa-item .local { color:#6c757d; font-size:0.95rem; }
        .missa-item .status { font-size:0.9rem; margin-top:4px; }
        .status-pendente { color:#d39e00; }
        .status-confirmado { color:var(--accent); }

        /* Login */
        .login-screen { min-height:100vh; display:flex; justify-content:center; align-items:center; background:var(--bg-gradient); padding:16px; }
        .login-card { background:white; border-radius:18px; padding:28px 20px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.2); text-align:center; }
        .login-card i { font-size:3rem; color:var(--primary); margin-bottom:12px; }
        .login-card h2 { font-size:1.25rem; margin-bottom:12px; }
        .login-btn { display:block; width:100%; padding:14px; margin:8px 0; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.16s; }
        .login-btn.admin { background:#2c3e50; color:white; }
        .login-btn.coroinha { background:var(--primary); color:white; }
        .login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,0.12); }

        /* Toast */
        .toast-container { position:fixed; top:10px; right:10px; left:10px; z-index:2000; display:flex; flex-direction:column; align-items:flex-end; pointer-events:none; }
        .toast { background:white; border-radius:8px; padding:12px 16px; margin-bottom:8px; box-shadow:0 10px 30px rgba(0,0,0,0.12); animation:slideInRight .28s; display:flex; align-items:center; gap:10px; font-size:0.95rem; width:100%; max-width:420px; pointer-events:auto; }
        .toast.success { border-left:4px solid var(--accent); }
        .toast.error { border-left:4px solid #dc3545; }
        .toast.info { border-left:4px solid var(--primary); }

        @keyframes slideInRight { from{transform:translateX(18px);opacity:0;}to{transform:translateX(0);opacity:1;} }

        .empty-state { text-align:center; padding:26px; color:var(--muted); }
        .login-coroinha-input { width:100%; padding:12px; border:2px solid #e9e9e9; border-radius:10px; font-size:1rem; margin-bottom:12px; }

        .debug-info { background:#f0f0f0; padding:6px 10px; border-radius:8px; font-size:0.9rem; color:#333; margin-top:10px; display:inline-block; }

        /* FAB para ações de admin em mobile */
        .fab { position:fixed; right:18px; bottom:18px; z-index:1200; display:none; border-radius:999px; box-shadow:0 10px 30px rgba(0,0,0,0.22); }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 900px) {
            .container { margin:8px; border-radius:12px; }
            .month-selector h2 { min-width:140px; font-size:1.05rem; }
        }

        @media (max-width: 600px) {
            body { padding:8px; }
            .header { padding:12px; gap:8px; align-items:center; }
            .logo i { font-size:1.3rem; }
            .logo h1 { font-size:1.15rem; }
            .user-badge { font-size:0.9rem; padding:8px 10px; }
            .btn { padding:10px 12px; font-size:1rem; min-height:56px; }
            .btn-sm { padding:10px 12px; min-height:48px; font-size:0.95rem; }

            /* Mostrar os dias como lista vertical (mais legível em mobile) */
            .calendar-grid { grid-template-columns:repeat(1,1fr); gap:10px; }
            .calendar-grid > div:nth-child(-n+7) { display:none; } /* esconde cabeçalhos dos dias */
            .calendar-day { flex-direction:row; justify-content:space-between; align-items:center; padding:14px 16px; min-height:64px; border-radius:12px; }
            .calendar-day .day-number { font-size:1.12rem; color:var(--primary); font-weight:700; }
            .calendar-day .has-missa { margin-top:0; padding:8px 12px; font-size:0.95rem; }
            .calendar-day .no-missa { margin-top:0; font-size:0.95rem; color:#a0a0a0; }

            .modal-content { padding:14px; max-width:98%; border-radius:12px; }
            .modal-header h3 { font-size:1.05rem; }

            .missa-item { padding:12px; flex-direction:row; justify-content:space-between; align-items:center; gap:8px; }
            .missa-item .horario { font-size:1rem; }
            .missa-item .local { font-size:0.9rem; }

            /* mostrar FAB para admin */
            .fab { display:block; }
        }

        @media (max-width: 400px) {
            .calendar-day { padding:10px 12px; min-height:56px; }
            .logo h1 { font-size:1rem; }
            .login-card { padding:16px; }
            .login-card h2 { font-size:1.15rem; }
            .login-btn { padding:12px; font-size:0.98rem; }
            .user-badge { font-size:0.85rem; padding:6px 8px; }
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <i class="fas fa-church"></i>
            <h2>Escala de Coroinhas<br>Paróquia São Benedito</h2>
            <p style="margin-bottom:12px;color:#6c757d;font-size:0.95rem;">Acesse como:</p>
            <button class="login-btn admin" id="btnAdminLogin">
                <i class="fas fa-lock"></i> Administrador
            </button>
            <button class="login-btn coroinha" id="btnCoroinhaLogin">
                <i class="fas fa-user"></i> Sou Coroinha
            </button>
            <div id="loginCoroinhaForm" style="display:none; margin-top:12px;">
                <input type="text" id="nomeCoroinhaLogin" class="login-coroinha-input" placeholder="Digite seu nome">
                <button class="login-btn coroinha" id="btnLoginCoroinha">Entrar</button>
            </div>
            <div id="loginAdminForm" style="display:none; margin-top:12px;">
                <input type="password" id="senhaAdmin" class="login-coroinha-input" placeholder="Senha">
                <button class="login-btn admin" id="btnLoginAdmin">Entrar</button>
            </div>
            <div id="statusMessage" class="debug-info" style="display:block;margin-top:12px;">Carregando...</div>
        </div>
    </div>

    <!-- SISTEMA -->
    <div class="container" id="mainSystem" style="display:none;">
        <header class="header">
            <div class="logo">
                <i class="fas fa-church"></i>
                <h1>Escala</h1>
            </div>
            <div class="header-actions">
                <span class="user-badge" id="userBadge"></span>
                <button class="btn btn-sm" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </header>
        <main class="main-content">
            <div class="controls">
                <div class="month-selector">
                    <button class="btn btn-sm" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <h2 id="currentMonth">Carregando...</h2>
                    <button class="btn btn-sm" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div id="adminActions" style="display:none;">
                    <button class="btn btn-success btn-sm" id="generateScaleBtn"><i class="fas fa-magic"></i> Gerar Escala</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </main>
    </div>

    <!-- MODAL DO DIA -->
    <div class="modal" id="dayModal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalDayTitle">
            <div class="modal-header">
                <h3 id="modalDayTitle">Dia</h3>
                <button class="modal-close" id="modalCloseBtn" aria-label="Fechar">&times;</button>
            </div>
            <div id="modalDayContent"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <!-- FAB (aparece em mobile quando admin estiver logado) -->
    <button id="fabGenerate" class="btn btn-success fab" title="Gerar Escala (Admin)" style="display:none;">
        <i class="fas fa-magic"></i>
    </button>

    <script>
        // ============================================================
        // (O script original foi mantido — preservei a lógica e só adicionei um pequeno handler para mostrar o FAB em mobile)
        // ============================================================
        const SUPABASE_URL = 'https://dflnzwutjzcqcsshvxdq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmbG56d3V0anpjcWNzc2h2eGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDAyMDAsImV4cCI6MjA5NzUxNjIwMH0.bqNhpB2E7UphmnqwIS78ESfo45XcGdI9oXJ1jpHilEU';

        let supabaseClient = null;
        let useLocalStorage = false;

        try {
            const lib = (typeof supabase !== 'undefined') ? supabase : (typeof supabaseJs !== 'undefined' ? supabaseJs : null);
            if (!lib) throw new Error('Biblioteca Supabase não carregada');
            supabaseClient = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase conectado');
            document.getElementById('statusMessage').textContent = '✅ Conectado ao Supabase';
        } catch (e) {
            console.warn('⚠️ Fallback localStorage:', e.message);
            document.getElementById('statusMessage').textContent = '⚠️ Modo offline (localStorage)';
            useLocalStorage = true;
            supabaseClient = {
                from: () => ({
                    select: () => ({ order: () => ({ then: (cb) => cb({ data: [], error: null }) }) }),
                    insert: (data) => ({ select: () => ({ single: () => ({ then: (cb) => cb({ data: data, error: null }) }) }) }),
                    update: (data) => ({ eq: () => ({ select: () => ({ single: () => ({ then: (cb) => cb({ data: data, error: null }) }) }) }) }),
                    delete: () => ({ eq: () => ({ then: (cb) => cb({ error: null }) }) }),
                    ilike: (col, val) => ({ maybeSingle: () => ({ then: (cb) => cb({ data: null, error: null }) }) })
                })
            };
        }

        let currentUser = null;
        let currentDate = new Date();
        let coroinhaAtual = null;

        const DB = {
            async getCoroinhas() {
                if (useLocalStorage) return this._localGet('coroinhas');
                const { data, error } = await supabaseClient.from('coroinhas').select('*').order('nome');
                if (error) { this._fallback(); throw error; }
                return data || [];
            },
            async getCoroinhaByNome(nome) {
                if (useLocalStorage) {
                    const list = this._localGet('coroinhas');
                    return list.find(c => c.nome.toLowerCase() === nome.toLowerCase()) || null;
                }
                const { data, error } = await supabaseClient.from('coroinhas').select('*').ilike('nome', nome).maybeSingle();
                if (error) { this._fallback(); throw error; }
                return data;
            },
            async createCoroinha(nome) {
                if (useLocalStorage) {
                    const list = this._localGet('coroinhas');
                    const novo = { id: Date.now().toString(), nome, ativo: true };
                    list.push(novo);
                    this._localSet('coroinhas', list);
                    return novo;
                }
                const { data, error } = await supabaseClient.from('coroinhas').insert({ nome, ativo: true }).select().single();
                if (error) { this._fallback(); throw error; }
                return data;
            },
            async getHorarios() {
                if (useLocalStorage) return this._localGet('horarios');
                const { data, error } = await supabaseClient.from('horarios').select('*');
                if (error) { this._fallback(); throw error; }
                return data || [];
            },
            async getDisponibilidades(mes, ano) {
                if (useLocalStorage) {
                    const all = this._localGet('disponibilidades');
                    return all.filter(d => d.mes === mes && d.ano === ano);
                }
                const { data, error } = await supabaseClient.from('disponibilidades').select('*').eq('mes', mes).eq('ano', ano);
                if (error) { this._fallback(); throw error; }
                return data || [];
            },
            async getEscalas(mes, ano) {
                if (useLocalStorage) {
                    const all = this._localGet('escalas');
                    return all.filter(e => e.mes === mes && e.ano === ano);
                }
                const { data, error } = await supabaseClient.from('escalas').select('*').eq('mes', mes).eq('ano', ano);
                if (error) { this._fallback(); throw error; }
                return data || [];
            },
            async createEscala(escala) {
                if (useLocalStorage) {
                    const list = this._localGet('escalas');
                    const nova = { ...escala, id: Date.now().toString() + Math.random() };
                    list.push(nova);
                    this._localSet('escalas', list);
                    return nova;
                }
                const { data, error } = await supabaseClient.from('escalas').insert(escala).select().single();
                if (error) { this._fallback(); throw error; }
                return data;
            },
            async updateEscala(id, updates) {
                if (useLocalStorage) {
                    const list = this._localGet('escalas');
                    const idx = list.findIndex(e => e.id === id);
                    if (idx !== -1) { list[idx] = { ...list[idx], ...updates }; this._localSet('escalas', list); }
                    return list[idx];
                }
                const { data, error } = await supabaseClient.from('escalas').update(updates).eq('id', id).select().single();
                if (error) { this._fallback(); throw error; }
                return data;
            },
            async deleteEscala(id) {
                if (useLocalStorage) {
                    let list = this._localGet('escalas');
                    list = list.filter(e => e.id !== id);
                    this._localSet('escalas', list);
                    return;
                }
                const { error } = await supabaseClient.from('escalas').delete().eq('id', id);
                if (error) { this._fallback(); throw error; }
            },
            async deleteEscalasByData(dataEscala) {
                if (useLocalStorage) {
                    let list = this._localGet('escalas');
                    list = list.filter(e => e.data_escala !== dataEscala);
                    this._localSet('escalas', list);
                    return;
                }
                const { error } = await supabaseClient.from('escalas').delete().eq('data_escala', dataEscala);
                if (error) { this._fallback(); throw error; }
            },
            _fallback() {
                if (!useLocalStorage) {
                    useLocalStorage = true;
                    console.warn('⚠️ Usando localStorage como fallback');
                    document.getElementById('statusMessage').textContent = '⚠️ Modo offline (localStorage)';
                    showToast('Modo offline ativado', 'info');
                }
            },
            _localGet(key) {
                try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
            },
            _localSet(key, data) {
                localStorage.setItem(key, JSON.stringify(data));
            }
        };

        const HORARIOS_PADRAO = [
            { dia_semana:'domingo', horario:'08:00', local:'Paróquia São Benedito' },
            { dia_semana:'domingo', horario:'10:00', local:'Paróquia São Benedito' },
            { dia_semana:'domingo', horario:'20:00', local:'Paróquia São Benedito' },
            { dia_semana:'domingo', horario:'18:00', local:'Capela Santo Antônio e São Miguel Arcanjo' },
            { dia_semana:'terca', horario:'19:00', local:'Capela Santo Antônio e São Miguel Arcanjo' },
            { dia_semana:'quarta', horario:'19:00', local:'Paróquia São Benedito' },
            { dia_semana:'quinta', horario:'19:30', local:'Paróquia São Benedito' },
            { dia_semana:'sexta', horario:'19:00', local:'Paróquia São Benedito' },
            { dia_semana:'sabado', horario:'17:00', local:'Capela Nossa Senhora Rosa Mística' }
        ];

        function showAdminLogin() {
            document.getElementById('loginAdminForm').style.display = 'block';
            document.getElementById('loginCoroinhaForm').style.display = 'none';
        }
        function showCoroinhaLogin() {
            document.getElementById('loginCoroinhaForm').style.display = 'block';
            document.getElementById('loginAdminForm').style.display = 'none';
        }

        async function loginAdmin() {
            try {
                const senha = document.getElementById('senhaAdmin').value;
                if (senha === 'Jesus') {
                    currentUser = 'admin';
                    await entrarSistema('admin');
                } else {
                    showToast('Senha incorreta!', 'error');
                }
            } catch (e) {
                console.error('Erro no loginAdmin:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function loginCoroinha() {
            try {
                const nome = document.getElementById('nomeCoroinhaLogin').value.trim();
                if (!nome) { showToast('Digite seu nome!', 'error'); return; }
                let coroinha = await DB.getCoroinhaByNome(nome);
                if (!coroinha) {
                    coroinha = await DB.createCoroinha(nome);
                    showToast('Coroinha criado!', 'success');
                } else if (!coroinha.ativo) {
                    showToast('Inativo!', 'error');
                    return;
                }
                currentUser = coroinha;
                coroinhaAtual = coroinha;
                await entrarSistema('coroinha');
            } catch (e) {
                console.error('Erro no loginCoroinha:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function entrarSistema(tipo) {
            try {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainSystem').style.display = 'block';

                if (tipo === 'admin') {
                    document.getElementById('userBadge').innerHTML = '<i class="fas fa-lock"></i> Administrador';
                    document.getElementById('adminActions').style.display = 'block';
                } else {
                    document.getElementById('userBadge').innerHTML = `<i class="fas fa-user"></i> ${currentUser.nome}`;
                    document.getElementById('adminActions').style.display = 'none';
                }

                const horarios = await DB.getHorarios();
                if (horarios.length === 0) {
                    for (const h of HORARIOS_PADRAO) {
                        await supabaseClient.from('horarios').insert(h);
                    }
                }

                // mostrar FAB se for admin e mobile
                toggleFab();

                await renderizarCalendario();
            } catch (e) {
                console.error('Erro ao entrar no sistema:', e);
                showToast('Erro ao carregar sistema: ' + e.message, 'error');
            }
        }

        function logout() {
            currentUser = null;
            coroinhaAtual = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainSystem').style.display = 'none';
        }

        async function renderizarCalendario() {
            try {
                const grid = document.getElementById('calendarGrid');
                const mes = currentDate.getMonth() + 1;
                const ano = currentDate.getFullYear();
                const hoje = new Date();
                const primeiroDia = new Date(ano, mes-1, 1).getDay();
                const diasNoMes = new Date(ano, mes, 0).getDate();

                const escalas = await DB.getEscalas(mes, ano);
                const confirmados = escalas.filter(e => e.status === 'confirmado');
                const porDia = {};
                confirmados.forEach(e => {
                    const key = e.data_escala;
                    porDia[key] = (porDia[key] || 0) + 1;
                });

                let html = '';
                const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
                for (let i=0; i<7; i++) {
                    html += `<div style="font-weight:600;text-align:center;padding:4px 0;color:#6c757d;font-size:0.8rem;">${diasSemana[i]}</div>`;
                }
                for (let i=0; i<primeiroDia; i++) {
                    html += `<div></div>`;
                }
                for (let dia=1; dia<=diasNoMes; dia++) {
                    const data = new Date(ano, mes-1, dia);
                    const dataStr = `${ano}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                    const isToday = data.toDateString() === hoje.toDateString();
                    const count = porDia[dataStr] || 0;
                    html += `
                        <div class="calendar-day ${isToday?'today':''}" data-data="${dataStr}" role="button" tabindex="0" aria-label="Dia ${dia} - ${count} missas">
                            <div class="day-number">${dia}</div>
                            ${count > 0 ? `<div class="has-missa">${count}</div>` : `<div class="no-missa">-</div>`}
                        </div>
                    `;
                }
                grid.innerHTML = html;

                document.querySelectorAll('.calendar-day[data-data]').forEach(el => {
                    el.addEventListener('click', function() {
                        abrirDia(this.dataset.data);
                    });
                    el.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') abrirDia(this.dataset.data);
                    });
                });

                updateMonthDisplay();
            } catch (e) {
                console.error('Erro ao renderizar calendário:', e);
                showToast('Erro ao carregar calendário: ' + e.message, 'error');
            }
        }

        function updateMonthDisplay() {
            const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            document.getElementById('currentMonth').textContent = `${meses[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
        }

        async function prevMonth() {
            const hoje = new Date();
            const mesAtual = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 1);
            if (currentDate <= mesAtual) { showToast('Não pode ver meses anteriores!', 'error'); return; }
            currentDate.setMonth(currentDate.getMonth() - 1);
            await renderizarCalendario();
        }

        async function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            await renderizarCalendario();
        }

        async function abrirDia(dataStr) {
            try {
                const modal = document.getElementById('dayModal');
                const title = document.getElementById('modalDayTitle');
                const content = document.getElementById('modalDayContent');

                const [ano, mes, dia] = dataStr.split('-').map(Number);
                const data = new Date(ano, mes-1, dia);
                const diaSemana = ['domingo','segunda','terca','quarta','quinta','sexta','sabado'][data.getDay()];
                const nomeDia = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][data.getDay()];
                title.textContent = `${nomeDia}, ${dia}/${mes}/${ano}`;

                let horarios = await DB.getHorarios();
                let horariosDoDia = horarios.filter(h => h.dia_semana === diaSemana);
                if (diaSemana === 'sexta' && dia <= 7) {
                    horariosDoDia.push({
                        id: 'extra',
                        dia_semana: 'sexta',
                        horario: '08:00',
                        local: 'Paróquia São Benedito (1ª Sexta)'
                    });
                }

                const todasEscalas = await DB.getEscalas(mes, ano);
                const escalasDoDia = todasEscalas.filter(e => e.data_escala === dataStr);

                let html = '';
                if (horariosDoDia.length === 0) {
                    html = '<div class="empty-state"><i class="fas fa-clock"></i><p>Nenhum horário de missa neste dia.</p></div>';
                } else {
                    for (const h of horariosDoDia) {
                        const escalasHorario = escalasDoDia.filter(e => e.horario === h.horario && e.local === h.local);
                        const confirmados = escalasHorario.filter(e => e.status === 'confirmado');
                        const pendentes = escalasHorario.filter(e => e.status === 'pendente');

                        const isAdmin = (currentUser === 'admin');
                        const isCoroinha = (currentUser !== 'admin' && currentUser !== null);
                        const coroinhaId = currentUser?.id;

                        let statusHtml = '';
                        let acoesHtml = '';

                        const minhaConfirmacao = confirmados.find(e => e.coroinha_id === coroinhaId);
                        const minhaPendencia = pendentes.find(e => e.coroinha_id === coroinhaId);

                        if (isAdmin) {
                            if (confirmados.length > 0) {
                                const nomesConfirmados = confirmados.map(e => e.coroinha_nome).join(', ');
                                statusHtml += `<div class="status status-confirmado"><i class="fas fa-check-circle"></i> Confirmados: ${nomesConfirmados}</div>`;
                            }
                            if (pendentes.length > 0) {
                                const nomesPendentes = pendentes.map(e => e.coroinha_nome).join(', ');
                                statusHtml += `<div class="status status-pendente"><i class="fas fa-hourglass-half"></i> Pendentes: ${nomesPendentes}</div>`;
                                pendentes.forEach(p => {
                                    acoesHtml += `
                                        <button class="btn btn-sm btn-success" data-action="confirmar" data-id="${p.id}"><i class="fas fa-check"></i> Confirmar</button>
                                        <button class="btn btn-sm btn-danger" data-action="recusar" data-id="${p.id}"><i class="fas fa-times"></i> Recusar</button>
                                    `;
                                });
                            }
                            if (confirmados.length === 0 && pendentes.length === 0) {
                                statusHtml = `<div class="status">Sem coroinhas</div>`;
                            }
                        } else if (isCoroinha) {
                            if (minhaConfirmacao) {
                                statusHtml = `<div class="status status-confirmado"><i class="fas fa-check-circle"></i> Você está confirmado</div>`;
                                acoesHtml = `<button class="btn btn-sm btn-danger" data-action="cancelar-confirmacao" data-id="${minhaConfirmacao.id}">Cancelar</button>`;
                            } else if (minhaPendencia) {
                                statusHtml = `<div class="status status-pendente"><i class="fas fa-hourglass-half"></i> Aguardando confirmação</div>`;
                                acoesHtml = `<button class="btn btn-sm btn-danger" data-action="cancelar-oferta" data-id="${minhaPendencia.id}">Cancelar oferta</button>`;
                            } else {
                                statusHtml = `<div class="status">Vago</div>`;
                                acoesHtml = `<button class="btn btn-sm btn-primary" data-action="oferecer" data-data="${dataStr}" data-horario="${h.horario}" data-local="${h.local}">Quero servir</button>`;
                            }
                        }

                        html += `
                            <div class="missa-item">
                                <div style="display:flex;flex-direction:column;align-items:flex-start;gap:6px;">
                                    <div class="horario">${h.horario}</div>
                                    <div class="local"><i class="fas fa-church"></i> ${h.local}</div>
                                </div>
                                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
                                    ${statusHtml}
                                    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">${acoesHtml}</div>
                                </div>
                            </div>
                        `;
                    }
                }

                if (currentUser === 'admin') {
                    html += `
                        <div style="margin-top:12px;text-align:right;">
                            <button class="btn btn-danger btn-sm" data-action="limpar-dia" data-data="${dataStr}"><i class="fas fa-trash"></i> Limpar dia</button>
                        </div>
                    `;
                }

                content.innerHTML = html;

                content.querySelectorAll('[data-action]').forEach(btn => {
                    btn.addEventListener('click', async function(e) {
                        const action = this.dataset.action;
                        if (action === 'confirmar') {
                            await confirmarEscala(this.dataset.id);
                        } else if (action === 'recusar') {
                            await recusarEscala(this.dataset.id);
                        } else if (action === 'cancelar-confirmacao') {
                            await cancelarConfirmacao(this.dataset.id);
                        } else if (action === 'cancelar-oferta') {
                            await cancelarOferta(this.dataset.id);
                        } else if (action === 'oferecer') {
                            await oferecerCoroinha(this.dataset.data, this.dataset.horario, this.dataset.local);
                        } else if (action === 'limpar-dia') {
                            await limparDia(this.dataset.data);
                        }
                    });
                });

                modal.classList.add('active');
                modal.setAttribute('aria-hidden','false');
            } catch (e) {
                console.error('Erro ao abrir dia:', e);
                showToast('Erro ao carregar dia: ' + e.message, 'error');
            }
        }

        function closeDayModal() {
            document.getElementById('dayModal').classList.remove('active');
            document.getElementById('dayModal').setAttribute('aria-hidden','true');
        }

        async function oferecerCoroinha(dataStr, horario, local) {
            try {
                if (!coroinhaAtual) { showToast('Erro: coroinha não identificado', 'error'); return; }
                const [ano, mes] = dataStr.split('-').map(Number);

                const escalas = await DB.getEscalas(mes, ano);
                const existente = escalas.find(e =>
                    e.data_escala === dataStr &&
                    e.horario === horario &&
                    e.local === local &&
                    e.coroinha_id === coroinhaAtual.id
                );
                if (existente) {
                    showToast('Você já está nessa missa!', 'error');
                    return;
                }

                const novaEscala = {
                    mes, ano,
                    data_escala: dataStr,
                    horario, local,
                    coroinha_id: coroinhaAtual.id,
                    coroinha_nome: coroinhaAtual.nome,
                    status: 'pendente',
                    funcao: 'Coroinha'
                };

                await DB.createEscala(novaEscala);
                showToast('Oferta registrada! Aguardando confirmação.', 'success');
                await abrirDia(dataStr);
                await renderizarCalendario();
            } catch (e) {
                console.error('Erro ao oferecer coroinha:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function cancelarOferta(escalaId) {
            try {
                if (!confirm('Cancelar sua oferta?')) return;
                await DB.deleteEscala(escalaId);
                showToast('Oferta cancelada.', 'success');
                const dataStr = document.getElementById('modalDayTitle').textContent.split(',')[1]?.trim();
                if (dataStr) await abrirDia(dataStr);
                await renderizarCalendario();
            } catch (e) {
                console.error('Erro ao cancelar oferta:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function cancelarConfirmacao(escalaId) {
            try {
                if (!confirm('Cancelar sua confirmação?')) return;
                await DB.deleteEscala(escalaId);
                showToast('Você foi removido da missa.', 'success');
                const dataStr = document.getElementById('modalDayTitle').textContent.split(',')[1]?.trim();
                if (dataStr) await abrirDia(dataStr);
                await renderizarCalendario();
            } catch (e) {
                console.error('Erro ao cancelar confirmação:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function confirmarEscala(escalaId) {
            try {
                await DB.updateEscala(escalaId, { status: 'confirmado' });
                showToast('Escala confirmada!', 'success');
                const dataStr = document.getElementById('modalDayTitle').textContent.split(',')[1]?.trim();
                if (dataStr) await abrirDia(dataStr);
                await renderizarCalendario();
            } catch (e) {
                console.error('Erro ao confirmar escala:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function recusarEscala(escalaId) {
            try {
                if (!confirm('Recusar esta oferta?')) return;
                await DB.deleteEscala(escalaId);
                showToast('Oferta recusada.', 'success');
                const dataStr = document.getElementById('modalDayTitle').textContent.split(',')[1]?.trim();
                if (dataStr) await abrirDia(dataStr);
                await renderizarCalendario();
            } catch (e) {
                console.error('Erro ao recusar escala:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function limparDia(dataStr) {
            try {
                if (!confirm(`Limpar todas as escalas deste dia?`)) return;
                await DB.deleteEscalasByData(dataStr);
                showToast('Dia limpo!', 'success');
                await abrirDia(dataStr);
                await renderizarCalendario();
            } catch (e) {
                console.error('Erro ao limpar dia:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        async function generateScale() {
            try {
                if (currentUser !== 'admin') {
                    showToast('Apenas administradores podem gerar escala!', 'error');
                    return;
                }
                const mes = currentDate.getMonth() + 1;
                const ano = currentDate.getFullYear();

                let horarios = await DB.getHorarios();
                if (horarios.length === 0) { showToast('Cadastre horários primeiro!', 'error'); return; }

                const disponibilidades = await DB.getDisponibilidades(mes, ano);
                if (disponibilidades.length === 0) { showToast('Nenhum coroinha respondeu disponibilidade!', 'error'); return; }

                const coroinhas = await DB.getCoroinhas();
                const ativos = coroinhas.filter(c => c.ativo);
                if (ativos.length === 0) { showToast('Nenhum coroinha ativo!', 'error'); return; }

                let horariosExpandidos = horarios.map(h => ({ ...h }));
                const diasNoMes = new Date(ano, mes, 0).getDate();
                for (let dia=1; dia<=diasNoMes; dia++) {
                    const data = new Date(ano, mes-1, dia);
                    if (data.getDay() === 5 && dia <= 7) {
                        horariosExpandidos.push({
                            id: 'extra-'+dia,
                            dia_semana: 'sexta',
                            horario: '08:00',
                            local: 'Paróquia São Benedito (1ª Sexta)'
                        });
                    }
                }

                const novasEscalas = [];
                const usados = {};

                for (let dia=1; dia<=diasNoMes; dia++) {
                    const data = new Date(ano, mes-1, dia);
                    const diaSemana = ['domingo','segunda','terca','quarta','quinta','sexta','sabado'][data.getDay()];
                    const dataStr = `${ano}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                    const horariosDoDia = horariosExpandidos.filter(h => h.dia_semana === diaSemana);

                    for (const h of horariosDoDia) {
                        const disponiveis = disponibilidades.filter(d => {
                            const dispDia = d.disponibilidade?.[diaSemana] || [];
                            return dispDia.includes(h.horario);
                        });
                        if (disponiveis.length === 0) continue;
                        disponiveis.sort((a,b) => (usados[a.coroinha_id]||0) - (usados[b.coroinha_id]||0));
                        const escolhido = disponiveis[0];
                        const coroinha = ativos.find(c => c.id === escolhido.coroinha_id);
                        if (!coroinha) continue;

                        novasEscalas.push({
                            mes, ano,
                            data_escala: dataStr,
                            horario: h.horario,
                            local: h.local || '',
                            coroinha_id: coroinha.id,
                            coroinha_nome: coroinha.nome,
                            status: 'confirmado',
                            funcao: 'Coroinha'
                        });
                        usados[coroinha.id] = (usados[coroinha.id]||0) + 1;
                    }
                }

                if (novasEscalas.length === 0) { showToast('Nenhuma escala possível!', 'error'); return; }

                const escalasExistentes = await DB.getEscalas(mes, ano);
                for (const e of escalasExistentes) {
                    await DB.deleteEscala(e.id);
                }
                for (const esc of novasEscalas) {
                    await DB.createEscala(esc);
                }

                await renderizarCalendario();
                showToast(`Escala gerada! ${novasEscalas.length} missas`, 'success');
            } catch (e) {
                console.error('Erro ao gerar escala:', e);
                showToast('Erro: ' + e.message, 'error');
            }
        }

        function showToast(msg, type='success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity='0';
                toast.style.transform='translateX(100%)';
                setTimeout(()=>toast.remove(),300);
            }, 3000);
        }

        // Inicialização e handlers
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Inicializando sistema...');

            document.getElementById('btnAdminLogin').addEventListener('click', showAdminLogin);
            document.getElementById('btnCoroinhaLogin').addEventListener('click', showCoroinhaLogin);
            document.getElementById('btnLoginAdmin').addEventListener('click', loginAdmin);
            document.getElementById('btnLoginCoroinha').addEventListener('click', loginCoroinha);

            document.getElementById('btnLogout').addEventListener('click', logout);
            document.getElementById('prevMonth').addEventListener('click', prevMonth);
            document.getElementById('nextMonth').addEventListener('click', nextMonth);
            document.getElementById('generateScaleBtn').addEventListener('click', generateScale);

            document.getElementById('modalCloseBtn').addEventListener('click', closeDayModal);
            document.getElementById('dayModal').addEventListener('click', function(e) {
                if (e.target === this) closeDayModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeDayModal();
            });

            // FAB handler
            document.getElementById('fabGenerate').addEventListener('click', function(){
                // same as generateScaleBtn
                generateScale();
            });

            updateMonthDisplay();
            console.log('Sistema inicializado com sucesso!');
            document.getElementById('statusMessage').textContent = '✅ Pronto! Clique em um botão.';
            // Atualiza visibilidade do FAB quando a tela muda
            window.addEventListener('resize', toggleFab);
        });

        // Mostra o FAB se for admin e a largura for pequena
        function toggleFab(){
            const fab = document.getElementById('fabGenerate');
            const isMobile = window.innerWidth <= 600;
            if (currentUser === 'admin' && isMobile) {
                fab.style.display = 'block';
            } else {
                fab.style.display = 'none';
            }
        }
    </script>
</body>
